name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk
        pip install buildozer cython

    - run: buildozer android debug
